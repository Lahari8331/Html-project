<!doctype html>
<html>
  <head>
    <title>Example</title>
    <style>
        body{
            background-color: grey;
        }
        h1{
            background-color:yellow ;
            color:red;
        }
        body>p{
            background-color: powderblue;
            color:black;
        }
        div p{
            background-color: orange;
            color:blue;
        }
        div>p{
            background-color: cyan;
            color:brown;
        }
        .nesteddiv p{
            background-color: navy;
            color:pink;
        }
        #firstp{
            background-color: tomato;
        }
        span p{
            background-color: pink;
            color:darkblue;
        }
        .nesteddiv p{
            background-color: lightgreen;
            color:maroon;
        }
        .nesteddiv>p{
            background-color: lightyellow;
            color:purple;
        }
        span{
            background-color: lightgray;
        }
    </style>
  </head>
  <body>
    <h1>h1 HEADER</h1>
    <p id="firstp">p outside div</p>
    <div>
      <p>p directly inside div</p>
      <span>
        <p>p inside span inside div</p>
      </span>
      <span>
        <p>p inside span inside div</p>
      </span>
      <p>p directly inside div</p>
      <div class="nesteddiv">
        <p>p inside nested div</p>
        <span>
          <p>p inside span inside nested div</p>
        </span>
        <span>
          <p>p inside span inside nested div</p>
        </span>
        <p>p inside nested div</p>
      </div>
       <p>p directly inside div</p>
      </div>
      <p>p outside div</p>
   </body>
</html>
