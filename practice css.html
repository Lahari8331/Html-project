<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        div{
            width:200px;
            border:1px solid;
            margin:100px;
            background-color: aquamarine;
            text-align: center;
        }
        #one{
            transform:rotate(30deg);
        }
        #two{
            transform:translate(100px);
        }
        #three{
            transform:scalex(0.5);
            transform:scaley(2);
        }
        #four{
            transform:skew(50deg);
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section>
        <div id="one">1</div>
        <div id="two">2</div>
        <div id="three">3</div>
        <div id="four">4</div>
    </section>
</body>
</html>
