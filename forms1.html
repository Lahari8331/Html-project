<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <h1>Course Registration Form</h1>
        <fieldset>
            <legend>User details</legend>
            <table>
                <tr>
                    <td><label for="">First Name</label></td>
                    <td><input type="text" name="name" placeholder="Lahari"/><br/></td>
                </tr>
                <tr>
                    <td><label for="">SurName</label></td>
                    <td><input type="text" name="surname"/><br/></td>
                </tr>
                <tr>
                    <td><label for="">Mobile number</label></td>
                    <td><input type="tel"/><br/></td>
                </tr>
                <tr>
                    <td><label for="">Email</label></td>
                    <td><input type="email"/><br/></td>
                </tr>
                <tr>
                    <td><label for="">password</label></td>
                    <td><input type="password"/><br/></td>
                </tr>
                <tr>
                    <td><label for="">confirm password</label></td>
                    <td><input type="password"/><br/></td>
                </tr>
                <tr>
                    <td><label for="">Date of Birth</label></td>
                    <td><input type="date"/><br/></td>
                </tr>
                <tr>
                    <td><label for="">Age</label></td>
                    <td><input type="number"/><br/></td>
                </tr>
                <tr>
                    <td><label for="">Gender</label></td>
                    <td><input type="radio"name="gender"value="M"/><label for="">Male</label>
                    <input type="radio"name="gender"value="F"/><label for="">Female</label>
                    <input type="radio"name="gender"value="other"/><label for="">Other</label></td>
                </tr>
                <tr>
                    <td><label for="">select country</label></td>
                    <td><select name=""id=""><option value="India">India</option>
                    <option value="USA">USA</option>
                    <option value="Europe">Europe</option>
                    </select><br/>
                </tr>
                <tr>
                    <td><label for="">Upload Picture</label></td>
                    <td><input type="file"/><br/></td>
                </tr>
                <tr>
                    <td><input type="reset"/><br/></td>
                </tr>
                </fieldset>
            </table>
            <fieldset>
            
            <h1>course details</h1>
             <table>
            <tr>
                <td><label for="">select course</label></td>
                <td><select name="course">
                    <option value="java full stack">java full stack</option>
                    <option value="python">python</option>
                    <option value="web development">web development</option></td>
                </select><br/>
            </tr>
             <tr>
                <td><label for="">delivery mode</label></td>
                <td><input type="radio" name="mode" value="online"/>online
                    <input type="radio" name="mode" value="offline"/>offline<br/></td>
             </tr>
             <tr>
                <td><label for="">Institute Name</label></td>
                <td><input type="text" name="institute" placeholder="Thopstech"/><br/></td>
             </tr>
             <tr>
            
                <td><label for="">comments</label><br/></td>
                <td><textarea id="comments" name="comments" cols="50" rows="10"></textarea></td>
             </tr>
               
               
        </fieldset>
    </table>
</form>
</body>
</html>
